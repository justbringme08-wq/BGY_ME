<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Workspace</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; padding: 15px; line-height: 1.5; }
        header { border-bottom: 1px solid #334155; padding-bottom: 12px; margin-bottom: 20px; }
        h1 { color: #60a5fa; font-size: 24px; }
        .subtitle { color: #94a3b8; font-size: 13px; }
        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background-color: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        .stat-card h2 { font-size: 13px; color: #cbd5e1; font-weight: normal; }
        .stat-card .number { font-size: 24px; font-weight: bold; }
        .num-blue { color: #3b82f6; }
        .num-green { color: #22c55e; }
        .form-section { background-color: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        .form-section h3 { font-size: 15px; margin-bottom: 10px; color: #cbd5e1; }
        .form-group { margin-bottom: 10px; }
        input, textarea, select { width: 100%; padding: 8px; background-color: #0f172a; border: 1px solid #475569; border-radius: 4px; color: #f8fafc; font-size: 14px; }
        button { width: 100%; padding: 10px; background-color: #2563eb; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 8px; }
        .tab-btn { background: none; border: none; color: #94a3b8; font-size: 14px; padding: 5px 10px; cursor: pointer; width: auto; }
        .tab-btn.active { color: #3b82f6; border-bottom: 2px solid #3b82f6; font-weight: bold; }
        .section-title { font-size: 16px; margin-bottom: 10px; color: #94a3b8; font-weight: bold; }
        .item-card { background-color: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
        .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .item-title { font-size: 15px; font-weight: bold; color: #f8fafc; }
        .badge { padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .badge-active { background-color: #14532d; color: #86efac; }
        .badge-planning { background-color: #713f12; color: #fde047; }
        .badge-completed { background-color: #1e3a8a; color: #93c5fd; }
        .item-desc { color: #94a3b8; font-size: 13px; margin-bottom: 8px; }
        .item-meta { color: #64748b; font-size: 11px; display: flex; justify-content: space-between; align-items: center; }
        .btn-delete { background: none; border: none; color: #ef4444; cursor: pointer; width: auto; padding: 0; font-size: 11px; }
        pre { background-color: #0f172a; padding: 8px; border-radius: 4px; overflow-x: auto; font-family: monospace; font-size: 12px; color: #a7f3d0; margin-top: 5px; border: 1px solid #334155; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <header>
        <h1>Shadow Workspace</h1>
        <div class="subtitle">Project Tracker & Repository Hub</div>
    </header>

    <div class="grid-stats">
        <div class="stat-card">
            <div>
                <h2>Projects</h2>
                <div class="number num-blue" id="count-projects">0</div>
            </div>
            <div style="font-size: 20px;">📁</div>
        </div>
        <div class="stat-card">
            <div>
                <h2>Snippets</h2>
                <div class="number num-green" id="count-snippets">0</div>
            </div>
            <div style="font-size: 20px;">💻</div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('project')">Add Project</button>
        <button class="tab-btn" onclick="switchTab('snippet')">Add Snippet</button>
    </div>

    <div id="form-project" class="form-section">
        <h3>New Project Entry</h3>
        <div class="form-group"><input type="text" id="p-title" placeholder="Project Name"></div>
        <div class="form-group"><textarea id="p-desc" placeholder="Project Description" rows="2"></textarea></div>
        <div class="form-group"><input type="text" id="p-tech" placeholder="Tech Stack (e.g., HTML, Node.js)"></div>
        <div class="form-group">
            <select id="p-status">
                <option value="Active">Active</option>
                <option value="Planning">Planning</option>
                <option value="Completed">Completed</option>
            </select>
        </div>
        <button onclick="saveProject()">Add to Repository</button>
    </div>

    <div id="form-snippet" class="form-section hidden">
        <h3>New Code Snippet</h3>
        <div class="form-group"><input type="text" id="s-title" placeholder="Snippet Title / Function Name"></div>
        <div class="form-group"><textarea id="s-code" placeholder="Paste your code here..." rows="4" style="font-family: monospace;"></textarea></div>
        <button onclick="saveSnippet()" style="background-color: #10b981;">Save Snippet</button>
    </div>

    <section>
        <div class="section-title">Project Repository</div>
        <div id="project-list"></div>
        <div class="section-title" style="margin-top: 20px;">Code Vault</div>
        <div id="snippet-list"></div>
    </section>

    <script>
        let projects = JSON.parse(localStorage.getItem('shadow_projects')) || [];
        let snippets = JSON.parse(localStorage.getItem('shadow_snippets')) || [];

        function switchTab(type) {
            const pForm = document.getElementById('form-project');
            const sForm = document.getElementById('form-snippet');
            const tabs = document.getElementsByClassName('tab-btn');
            if(type === 'project') {
                pForm.classList.remove('hidden'); sForm.classList.add('hidden');
                tabs[0].classList.add('active'); tabs[1].classList.remove('active');
            } else {
                pForm.classList.add('hidden'); sForm.classList.remove('hidden');
                tabs[0].classList.remove('active'); tabs[1].classList.add('active');
            }
        }

        function saveProject() {
            const title = document.getElementById('p-title').value.trim();
            const desc = document.getElementById('p-desc').value.trim();
            const tech = document.getElementById('p-tech').value.trim();
            const status = document.getElementById('p-status').value;
            if(!title) return alert('Project Name is required.');
            projects.push({ id: Date.now(), title, desc, tech, status });
            localStorage.setItem('shadow_projects', JSON.stringify(projects));
            document.getElementById('p-title').value = ''; document.getElementById('p-desc').value = ''; document.getElementById('p-tech').value = '';
            renderData();
        }

        function saveSnippet() {
            const title = document.getElementById('s-title').value.trim();
            const code = document.getElementById('s-code').value.trim();
            if(!title || !code) return alert('Both Fields are required.');
            snippets.push({ id: Date.now(), title, code });
            localStorage.setItem('shadow_snippets', JSON.stringify(snippets));
            document.getElementById('s-title').value = ''; document.getElementById('s-code').value = '';
            renderData();
        }

        function deleteProject(id) { projects = projects.filter(p => p.id !== id); localStorage.setItem('shadow_projects', JSON.stringify(projects)); renderData(); }
        function deleteSnippet(id) { snippets = snippets.filter(s => s.id !== id); localStorage.setItem('shadow_snippets', JSON.stringify(snippets)); renderData(); }

        function renderData() {
            document.getElementById('count-projects').innerText = projects.length;
            document.getElementById('count-snippets').innerText = snippets.length;
            const pList = document.getElementById('project-list');
            if(projects.length === 0) { pList.innerHTML = '<div style="color:#64748b; font-size:13px; text-align:center; padding:10px;">No projects documented yet.</div>'; }
            else { pList.innerHTML = projects.map(p => `<div class="item-card"><div class="item-header"><div class="item-title">${p.title}</div><span class="badge badge-${p.status.toLowerCase()}">${p.status}</span></div><div class="item-desc">${p.desc || ''}</div><div class="item-meta"><span>Tech: ${p.tech || 'None'}</span><button class="btn-delete" onclick="deleteProject(${p.id})">Delete</button></div></div>`).join(''); }
            const sList = document.getElementById('snippet-list');
            if(snippets.length === 0) { sList.innerHTML = '<div style="color:#64748b; font-size:13px; text-align:center; padding:10px;">Code vault is empty.</div>'; }
            else { sList.innerHTML = snippets.map(s => `<div class="item-card"><div class="item-header"><div class="item-title" style="color:#10b981;">${s.title}</div><button class="btn-delete" onclick="deleteSnippet(${s.id})">Delete</button></div><pre><code>${s.code.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code></pre></div>`).join(''); }
        }
        renderData();
    </script>
</body>
</html>
