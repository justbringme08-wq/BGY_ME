<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Workspace v2</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; padding: 20px; min-height: 100vh; }
        
        header { border-bottom: 1px solid rgba(99, 102, 241, 0.2); padding-bottom: 16px; margin-bottom: 25px; }
        h1 { color: #38bdf8; font-size: 28px; font-weight: 800; letter-spacing: -0.5px; text-shadow: 0 0 10px rgba(56, 189, 248, 0.2); }
        .subtitle { color: #94a3b8; font-size: 14px; margin-top: 4px; }
        
        /* Stats Cards with Glow */
        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .stat-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 16px; display: flex; justify-content: space-between; align-items: center; transition: transform 0.2s; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .stat-card:hover { transform: translateY(-2px); border-color: rgba(99, 102, 241, 0.4); }
        .stat-card h2 { font-size: 13px; color: #94a3b8; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card .number { font-size: 32px; font-weight: 800; margin-top: 4px; }
        .num-blue { color: #38bdf8; text-shadow: 0 0 12px rgba(56, 189, 248, 0.4); }
        .num-green { color: #34d399; text-shadow: 0 0 12px rgba(52, 211, 153, 0.4); }
        .icon { font-size: 22px; opacity: 0.8; }

        /* Navigation Tabs */
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding-bottom: 4px; }
        .tab-btn { background: none; border: none; color: #64748b; font-size: 14px; font-weight: 600; padding: 8px 16px; cursor: pointer; border-radius: 6px; transition: all 0.2s; }
        .tab-btn.active { color: #38bdf8; background: rgba(56, 189, 248, 0.1); }

        /* Modern Input Form */
        .form-section { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 20px; margin-bottom: 25px; box-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.05); }
        .form-section h3 { font-size: 16px; margin-bottom: 14px; color: #e2e8f0; font-weight: 600; }
        .form-group { margin-bottom: 12px; }
        input, textarea, select { width: 100%; padding: 10px 14px; background-color: #0f172a; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: #f8fafc; font-size: 14px; transition: border-color 0.2s; }
        input:focus, textarea:focus, select:focus { border-color: #38bdf8; outline: none; box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2); }
        button { width: 100%; padding: 12px; background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }

        /* Repository Lists */
        .section-title { font-size: 15px; margin-bottom: 12px; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .item-card { background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 10px; padding: 16px; margin-bottom: 12px; }
        .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .item-title { font-size: 16px; font-weight: 600; color: #f1f5f9; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .badge-active { background-color: rgba(16, 185, 129, 0.1); color: #34d399; border: 1px solid rgba(52, 211, 153, 0.2); }
        .badge-planning { background-color: rgba(245, 158, 11, 0.1); color: #fbbf24; border: 1px solid rgba(251, 191, 36, 0.2); }
        .badge-completed { background-color: rgba(59, 130, 246, 0.1); color: #60a5fa; border: 1px solid rgba(96, 165, 251, 0.2); }
        .item-desc { color: #94a3b8; font-size: 13px; margin-bottom: 12px; }
        .item-meta { color: #64748b; font-size: 12px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255, 255, 255, 0.05); padding-top: 10px; }
        .btn-delete { background: none; border: none; color: #f87171; cursor: pointer; font-size: 12px; font-weight: 500; }
        .btn-delete:hover { text-decoration: underline; }
        
        pre { background-color: #020617; padding: 12px; border-radius: 8px; overflow-x: auto; font-family: monospace; font-size: 12px; color: #34d399; margin-top: 8px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>Shadow Workspace</h1>
        <div class="subtitle">Project Tracker & Repository Hub</div>
    </header>

    <div class="grid-stats">
        <div class="stat-card">
            <div>
                <h2>Projects</h2>
                <div class="number num-blue" id="count-projects">0</div>
            </div>
            <div class="icon">📁</div>
        </div>
        <div class="stat-card">
            <div>
                <h2>Snippets</h2>
                <div class="number num-green" id="count-snippets">0</div>
            </div>
            <div class="icon">💻</div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('project')">Add Project</button>
        <button class="tab-btn" onclick="switchTab('snippet')">Add Snippet</button>
    </div>

    <div id="form-project" class="form-section">
        <h3>New Project Entry</h3>
        <div class="form-group"><input type="text" id="p-title" placeholder="Project Name"></div>
        <div class="form-group"><textarea id="p-desc" placeholder="Project Description" rows="2"></textarea></div>
        <div class="form-group"><input type="text" id="p-tech" placeholder="Tech Stack (e.g., HTML, Node.js)"></div>
        <div class="form-group">
            <select id="p-status">
                <option value="Active">Active</option>
                <option value="Planning">Planning</option>
                <option value="Completed">Completed</option>
            </select>
        </div>
        <button onclick="saveProject()">Add to Repository</button>
    </div>

    <div id="form-snippet" class="form-section hidden">
        <h3>New Code Snippet</h3>
        <div class="form-group"><input type="text" id="s-title" placeholder="Snippet Title / Function Name"></div>
        <div class="form-group"><textarea id="s-code" placeholder="Paste your code here..." rows="4" style="font-family: monospace;"></textarea></div>
        <button onclick="saveSnippet()" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);">Save Snippet</button>
    </div>

    <section>
        <div class="section-title">Project Repository</div>
        <div id="project-list"></div>
        <div class="section-title" style="margin-top: 25px;">Code Vault</div>
        <div id="snippet-list"></div>
    </section>

    <script>
        let projects = JSON.parse(localStorage.getItem('shadow_projects')) || [];
        let snippets = JSON.parse(localStorage.getItem('shadow_snippets')) || [];

        function switchTab(type) {
            const pForm = document.getElementById('form-project');
            const sForm = document.getElementById('form-snippet');
            const tabs = document.getElementsByClassName('tab-btn');
            if(type === 'project') {
                pForm.classList.remove('hidden'); sForm.classList.add('hidden');
                tabs[0].classList.add('active'); tabs[1].classList.remove('active');
            } else {
                pForm.classList.add('hidden'); sForm.classList.remove('hidden');
                tabs[0].classList.remove('active'); tabs[1].classList.add('active');
            }
        }

        function saveProject() {
            const title = document.getElementById('p-title').value.trim();
            const desc = document.getElementById('p-desc').value.trim();
            const tech = document.getElementById('p-tech').value.trim();
            const status = document.getElementById('p-status').value;
            if(!title) return alert('Project Name is required.');
            projects.push({ id: Date.now(), title, desc, tech, status });
            localStorage.setItem('shadow_projects', JSON.stringify(projects));
            document.getElementById('p-title').value = ''; document.getElementById('p-desc').value = ''; document.getElementById('p-tech').value = '';
            renderData();
        }

        function saveSnippet() {
            const title = document.getElementById('s-title').value.trim();
            const code = document.getElementById('s-code').value.trim();
            if(!title || !code) return alert('Both Fields are required.');
            snippets.push({ id: Date.now(), title, code });
            localStorage.setItem('shadow_snippets', JSON.stringify(snippets));
            document.getElementById('s-title').value = ''; document.getElementById('s-code').value = '';
            renderData();
        }

        function deleteProject(id) { projects = projects.filter(p => p.id !== id); localStorage.setItem('shadow_projects', JSON.stringify(projects)); renderData(); }
        function deleteSnippet(id) { snippets = snippets.filter(s => s.id !== id); localStorage.setItem('shadow_snippets', JSON.stringify(snippets)); renderData(); }

        function renderData() {
            document.getElementById('count-projects').innerText = projects.length;
            document.getElementById('count-snippets').innerText = snippets.length;
            const pList = document.getElementById('project-list');
            if(projects.length === 0) { pList.innerHTML = '<div style="color:#64748b; font-size:13px; text-align:center; padding:15px;">No projects documented yet.</div>'; }
            else { pList.innerHTML = projects.map(p => `<div class="item-card"><div class="item-header"><div class="item-title">${p.title}</div><span class="badge badge-${p.status.toLowerCase()}">${p.status}</span></div><div class="item-desc">${p.desc || 'No description.'}</div><div class="item-meta"><span>Tech: ${p.tech || 'None'}</span><button class="btn-delete" onclick="deleteProject(${p.id})">Delete</button></div></div>`).join(''); }
            const sList = document.getElementById('snippet-list');
            if(snippets.length === 0) { sList.innerHTML = '<div style="color:#64748b; font-size:13px; text-align:center; padding:15px;">Code vault is empty.</div>'; }
            else { sList.innerHTML = snippets.map(s => `<div class="item-card"><div class="item-header"><div class="item-title" style="color:#34d399;">${s.title}</div><button class="btn-delete" onclick="deleteSnippet(${s.id})">Delete</button></div><pre><code>${s.code.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code></pre></div>`).join(''); }
        }
        renderData();
    </script>
</body>
</html>

<body>

</body>
</html>
